<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Анимации</title>

	<style>
		
		.main {
			width: 737px;
			height: 506px;
			background-image: url(https://i.ibb.co/YZJVcYV/main.png);
			margin: 0 auto;
			position: relative;
		}

		.snow,
		.sky {
			width: 142px;
			height: 186px;
			position: absolute;
			top: 55px;
			left: 525px;
			z-index: -1;
		}

		.sky {
			background-color: #709aff;
		}

		@keyframes SkyAnimation
		{
			from { background-color: #709aff; }
			50% { background-color: #4400ba; }
			to { background-color: #27004a; }
		}

		@keyframes SnowAnimation
		{
			from { background-position: 0 372px; }
			to { background-position: 0 0; }
		}

		.snow {
			background-image: url(https://i.ibb.co/KwnLxqt/snow.png);
			animation: SnowAnimation 1s steps(4) infinite;
		}

		.santa {
			width: 111.8px;
			height: 144.3px;
			position: absolute;
			bottom: 130px;
			right: 0;
			background: url(https://i.ibb.co/BTbKyJ0/santa.png) 111.8px 0 no-repeat; background-size: contain;
		}

		@keyframes SantaAnimation
		{
			from { background-position: 111.8px;}
			to { background-position: 0 0;}
		}

		.fire {
			width: 90px;
			height: 90px;
			position: absolute;
			top: 295px;
			left: 310px;
			background: url(https://i.ibb.co/wr77QqL/fire.png) 0 0;
		}

		@keyframes FireAnimation 
		{
			from { background-position: 0 0; }
			to { background-position: 360px 0; }
		}

		.clock {
			width: 64px;
			height: 127px;
			position: absolute;
			top: 30px;
			left: 30px;
			background-image: url(https://i.ibb.co/0Ky9JBP/clock.png);
		}

		@keyframes ClockAnimation
		{
			from { transform: rotate(0); }
			25% { transform: rotate(20deg); }
			75% { transform: rotate(-20deg); }
			to { transform: rotate(-0); }
		}

		.arrow {
			width: 2px;
			height: 10px;
			background-color: black;
			position: absolute;
			top: 31px;
			left: 31px;
		}

		@keyframes ArrowAnimation 
		{
			from { transform: rotate(0); transform-origin: bottom left; }
			25% { transform: rotate(90deg); transform-origin: bottom left; }
			50% { transform: rotate(180deg); transform-origin: bottom left; }
			75% { transform: rotate(270deg); transform-origin: bottom left; }
			to { transform: rotate(360deg); transform-origin: bottom left; }
		}

		.balls {
			width: 225px;
			height: 300px;
			background-image: url(https://i.ibb.co/6W8KQ4y/balls.png);
			position: absolute;
			top: 74px;
			left: 0;
		}

		@keyframes BallsAnimation
		{
			from { filter: hue-rotate(0); }
			50% { filter: hue-rotate(260deg); }
			to { filter: hue-rotate(320deg); }
		}

		.main:hover .sky {
			animation: SkyAnimation 5s infinite alternate;
		}

		.main:hover .santa {
			animation: SantaAnimation 1s steps(15) infinite alternate;
		}

		.main:hover .fire {
			animation: FireAnimation 1s steps(4) infinite;
		}

		.main:hover .clock {
			animation: ClockAnimation 2s infinite;
		}

		.main:hover .arrow {
			animation: ArrowAnimation 4s steps(12) infinite;
		}

		.main:hover .balls {
			animation: BallsAnimation 8s infinite alternate;
		}

	</style>

</head>
<body>

	<span></span>

	<div class="main">
		<div class="sky"></div>

		<div class="snow"></div>
		
		<div class="santa"></div>

		<div class="fire"></div>

		<div class="clock">
			<div class="arrow"></div>
		</div>
		
		<div class="balls"></div>

	</div>

</body>
</html>
